name: PR CI

on:
  pull_request:
    branches:
      - main
  merge_group:

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder-anon-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

  database:
    name: database
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start local Supabase stack
        run: pnpm supabase:start

      - name: Reset local database
        run: supabase db reset

      - name: Lint database
        run: supabase db lint

      - name: Run verification SQL snippets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          snippets=(supabase/snippets/*_verification.sql)
          if [ ${#snippets[@]} -eq 0 ]; then
            echo "No verification snippets found."
            exit 0
          fi

          for snippet in "${snippets[@]}"; do
            echo "Running ${snippet}"
            docker exec -i supabase_db_finance_app \
              psql -v ON_ERROR_STOP=1 -U postgres -d postgres < "${snippet}"
          done

      - name: Stop local Supabase stack
        if: always()
        run: pnpm supabase:stop

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start local Supabase stack
        run: pnpm supabase:start

      - name: Export local Supabase env
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..30}; do
            if output="$(supabase status -o env)"; then
              api_url="$(printf '%s\n' "$output" | sed -n 's/^API_URL=//p' | head -n1)"
              anon_key="$(printf '%s\n' "$output" | sed -n 's/^ANON_KEY=//p' | head -n1)"

              api_url="${api_url#\"}"
              api_url="${api_url%\"}"
              anon_key="${anon_key#\"}"
              anon_key="${anon_key%\"}"

              if [ -n "$api_url" ] && [ -n "$anon_key" ]; then
                {
                  printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n' "$api_url"
                  printf 'NEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$anon_key"
                } >> "$GITHUB_ENV"
                exit 0
              fi
            fi

            if [ "$attempt" -eq 30 ]; then
              break
            fi

            echo "Waiting for Supabase services to become ready (${attempt}/30)..."
            sleep 2
          done

          echo "Supabase status output did not expose API_URL and ANON_KEY."
          exit 1

      - name: Run Playwright end-to-end tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Stop local Supabase stack
        if: always()
        run: pnpm supabase:stop
