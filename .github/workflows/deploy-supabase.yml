name: Deploy Supabase

on:
  push:
    branches:
      - main
    paths:
      - supabase/**
  workflow_dispatch:

concurrency:
  group: deploy-supabase-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-supabase:
    name: deploy-supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          : "${SUPABASE_ACCESS_TOKEN:?Missing SUPABASE_ACCESS_TOKEN secret}"
          : "${SUPABASE_PROJECT_REF:?Missing SUPABASE_PROJECT_REF secret}"
          : "${SUPABASE_DB_PASSWORD:?Missing SUPABASE_DB_PASSWORD secret}"

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations to production
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"
